version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_HTTP_TIMEOUT_SEC=${LLM_HTTP_TIMEOUT_SEC:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - STOCKFISH_PATH=/usr/games/stockfish
      - STOCKFISH_UCI_TIMEOUT_SEC=${STOCKFISH_UCI_TIMEOUT_SEC:-120}
      - DATABASE_URL=postgresql://boardsight:boardsight@db:5432/boardsight
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: boardsight
      POSTGRES_PASSWORD: boardsight
      POSTGRES_DB: boardsight
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardsight"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m worker.main
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_HTTP_TIMEOUT_SEC=${LLM_HTTP_TIMEOUT_SEC:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - STOCKFISH_PATH=/usr/games/stockfish
      - STOCKFISH_UCI_TIMEOUT_SEC=${STOCKFISH_UCI_TIMEOUT_SEC:-120}
      - DATABASE_URL=postgresql://boardsight:boardsight@db:5432/boardsight
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
